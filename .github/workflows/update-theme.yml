name: Update theme

on:
  schedule:
    # 21:00 UTC = 06:00 JST daily
    - cron: "0 21 * * *"
  repository_dispatch:
    types: [theme-updated]
  workflow_dispatch:

# Serialize runs so a scheduled run and a dispatched run never race on main.
concurrency:
  group: update-theme
  cancel-in-progress: false

permissions:
  contents: write # commit and push the submodule bump
  actions: write # trigger the Deploy workflow via workflow_dispatch

jobs:
  update-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Initialize the submodule so `git submodule update --remote` can bump it.
          submodules: true
      - name: Update theme submodule
        id: update
        run: |
          git submodule update --remote hugo/themes/hugo-take-theme
          if git diff --quiet hugo/themes/hugo-take-theme; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(git -C hugo/themes/hugo-take-theme rev-parse --short HEAD)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hugo/themes/hugo-take-theme
          git commit -m "build(theme): bump hugo-take-theme to ${{ steps.update.outputs.short_sha }}"
          git push
      - name: Trigger deploy workflow
        # A push made with GITHUB_TOKEN does not fire `on: push`, so kick the
        # Deploy workflow explicitly. workflow_dispatch created via GITHUB_TOKEN
        # is exempt from the recursive-trigger prevention rule.
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run main.yml --ref main
